<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="logo.png">
    <title>Mapa</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-hospital" style="font-size: 2rem;"></i>
            <h2>MAPA</h2>
        </div>
        <div class="search-container">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="map-search" placeholder="Pesquisar no Mapa...">
            </div>
        </div>

        <nav class="menu-content">
            <button class="btn-menu" onclick="irParaVilaVelha()">
                <i class="bi bi-geo-alt-fill"></i> Vila Velha
            </button>
            <button class="btn-menu" onclick="irParaVitoria()">
                <i class="bi bi-geo-alt-fill"></i> Vitória
            </button>
            <button class="btn-menu" onclick="minhaLocalizacao()">
                <i class="bi bi-crosshair"></i> Minha Localização
            </button>
        </nav>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-20.3297, -40.2944], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        function irParaVilaVelha() {
            map.flyTo([-20.3297, -40.2944], 14);
            L.marker([-20.3297, -40.2944]).addTo(map).bindPopup('Vila Velha - ES').openPopup();
        }

        function irParaVitoria() {
            map.flyTo([-20.2976, -40.2958], 14);
            L.marker([-20.2976, -40.2958]).addTo(map).bindPopup('Vitória - ES').openPopup();
        }

        function minhaLocalizacao() {
            map.locate({ setView: true, maxZoom: 16 });
        }

        map.on('locationfound', (e) => {
            L.marker(e.latlng).addTo(map).bindPopup("Você está aqui!").openPopup();
        });

        // Captura o campo de pesquisa
        const searchInput = document.getElementById('map-search');

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                // Aqui você poderia consumir uma API de Geocoding (como a do OpenStreetMap)
                // Por enquanto, vamos simular um alerta com o que foi digitado
                alert("Buscando por: " + query + "\n(Dica: No futuro, aqui integraremos com a API de busca!)");
                searchInput.value = ""; // Limpa o campo
            }
        });
    </script>
</body>

</html>
