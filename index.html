<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Mapa</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-map-fill" style="font-size: 2rem; color: #64ffda;"></i>
            <h2>MAPA</h2>
        </div>

        <div class="search-container">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="map-search" placeholder="Pesquisar no Mapa..." autocomplete="off">
            </div>
            <div id="search-results" class="suggestions-list"></div>
        </div>

        <nav class="menu-content">
            <button class="btn-menu" onclick="irParaVilaVelha()">
                <i class="bi bi-geo-alt-fill"></i> Vila Velha
            </button>
            <button class="btn-menu" onclick="irParaVitoria()">
                <i class="bi bi-geo-alt-fill"></i> Vitória
            </button>
            <button class="btn-menu" onclick="minhaLocalizacao()">
                <i class="bi bi-crosshair"></i> Minha Localização
            </button>
        </nav>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
